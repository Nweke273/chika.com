<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: salmon;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        nav{
          position: absolute;
          top: 0;
          width: 100%;
          background-color: transparent;
         font-size: 1.5rem; 
          padding: 10px 0px;
          display: flex;
          justify-content: flex-end;
          
        }
        nav a{
            text-decoration: none;
            color: rgb(32, 151, 32);
            background-color: white;
            margin-right: 4rem;
            padding: .8rem;
            border-radius: 12px;
        }
        
        img{
            width: 70px;
            position: absolute;
            left: 50%;
            transform: translate(-50%);
            top: 60px;
            z-index: 2;
        }
        .clock{
            position: relative;
            background: #fcfafa;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 5px solid rgb(139, 194, 139);
            box-shadow: 1px 1px 4px rgba(0, 0, 0, .7);

        }
        .numbers div{
            position: absolute;
            font-size: 27px;
            font-weight: bold;
            color: rgb(146, 208, 172);
            text-shadow: 1px 1px 2px rgba(0,0,0,.7);
        }

        .twelve {
            top: 6px;
            left: 50%;
            transform: translate(-50%);
        }
        .three {
            right: 6px;
            top: 50%;
            transform: translateY(-50%);

        }
        .six {
             bottom: 6px;
             left: 50%;
            transform: translateX(-50%);
        }
        .nine{
            left: 6px;
            top: 50%;
            transform: translateY(-50px);
        }
        .arrow {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        .arrow::before{
            content: "";
            width: 25px;
            height: 25px;
            background-color: rgb(112, 167, 112);
            border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0.7);
            z-index: 4;
        }
        .arrow div {
            background: white;
            width: 7px;
            position: absolute;
            height: 120px;
            transform-origin: bottom center;
            bottom: 50%;
            z-index: 3;
            border-radius: 50% 50% 0 0;
            box-shadow: 1px 1px 2px rgba(0,0,0.7);
        }

       .arrow .hour {
            height: 80px;
            transform: rotate(30deg);
        }
        
       .arrow .second {
            transform: rotate(250deg);
            background-color: goldenrod;
        }
    </style>
</head>
<body>
    <nav>
<a href="porfolio.html">Home</a>
</nav>
    <div class="clock">
        <div class="numbers">
             <div class="twelve">12</div>
             <div class="three">3</div>
             <div class="six">6</div>
             <div class="nine">9</div>
        </div>
        <div class="arrow">
             <div class="hour"></div>
             <div class="minute"></div>
             <div class="second"></div>
        </div>
        <img src="https://pluspng.com/logo-img/ro130rolfd1c-rolex-logo-rolex-pluspng.png" alt="">
    </div>
    <script>
        const hourEl = document.querySelector(".hour");
         const minuteEl = document.querySelector(".minute");
          const secondEl = document.querySelector(".second");

          function updateClock(){
          const conrrentDate = new Date();
          setTimeout(updateClock, 1000);
          const hour = conrrentDate.getHours();
           const minute = conrrentDate.getMinutes();
            const second = conrrentDate.getSeconds();
            const hourDeg = (hour / 12) * 360;
            hourEl.style.transform = `rotate(${hourDeg}deg)`;
            // -----
            const minuteDeg = (minute / 60) * 360;
            minuteEl.style.transform = `rotate(${minuteDeg}deg)`;
        // -------
          const secondDeg = (second / 60) * 360;
            secondEl.style.transform = `rotate(${secondDeg}deg)`;
          }

          updateClock();
    </script>
</body>
</html>
