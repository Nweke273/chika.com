<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dolist</title>


    <style>
.container{
    display: flex;
    flex-direction: column;
    justify-items: center;
    /* justify-content: center; */
    margin-top: 2rem;
    margin-right: 6rem;
    /* background: linear-gradient(#355872, #7AAACE, #9CD5FF); */
}

h1 {
    margin: 0 13rem;
    
    
}
form input{
    height: 2rem;
    width: 50%;
    
}
ul{
    list-style: none;
    padding: 0;
}

li{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

form button{
    font-size: 16px;
}

.error{
    border: 3px solid red;
}

.success{
    border: 3px solid green;
}

    </style>
</head>
<body>
    <h1>TO DO LIST</h1>
    <div class="container">


        <form id="formEl">
            <input type="text" id="inputBox" placeholder="Enter list">
        </form>
<ul id="ul-container"></ul>

    </div>


<script>
const form = document.querySelector("#formEl");
const inputBox = document.querySelector("#inputBox");
const ulEl  = document.querySelector("#ul-container");
let listArry = [];

//  SUBMIT EVENT
form.addEventListener("submit", function (e) {
    e.preventDefault();

    const value = inputBox.value.trim();

    if (value === "") {
        inputBox.classList.add("error");
        inputBox.classList.remove("success");
        return;
    }

    inputBox.classList.remove("error");
    inputBox.classList.add("success");

    listArry.push(value);
    inputBox.value = "";
    renderTodo();
});

//  CLEAR RED/GREEN WHILE TYPING 
inputBox.addEventListener("input", function () {
    inputBox.classList.remove("error", "success");
});

function renderTodo() {
    ulEl.innerHTML = "";

    listArry.forEach((item, index) => {
        const li = document.createElement("li");
        li.textContent = item;

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";

        deleteBtn.addEventListener("click", function () {
            listArry.splice(index, 1);
            renderTodo();
        });

        li.appendChild(deleteBtn);
        ulEl.appendChild(li);
    });
}
</script>

</body>
</html>
