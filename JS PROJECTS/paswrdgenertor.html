<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        .Password__container{
            background-color: pink;
            width: 500px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,.3);
            margin: 10px;
        }
        .input__container{
            border: 2px solid black;
            padding: 6px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
         .input__container input{
            border: none;
            outline: none;
            background-color: transparent;
            font-size: 20px;
            letter-spacing: 3px;
        }
          .input__container input::placeholder{
            letter-spacing: 0px;
          }
          .fa-solid {
            cursor: pointer;
            opacity: 0.3;
          }
          .fa-solid:hover{
            opacity: 0.8;
          }
          .btn{
            background: black;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 15px;
            cursor: pointer;
          }
           .btn:hover{
          background-color: green;
          }
           .btn:active{
            transform: scale(0.95);
           }
           .alert-container{
            position: fixed;
            width: 300px;
            height: 50px;
            background-color: lightgreen;
            right: 20px;
            bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: 0.4s;
           }
           .active.alert-container{
            right: -300px;
           }
    </style>
</head>
<body>
    <div class="Password__container">
      <h2>Random Password Generator</h2>

        <div class="input__container">
           <input type="text" name="text" id="input" placeholder="create Password" readonly>
           <i class="fa-solid fa-copy"></i>
        </div>
        <button class="btn">Generate</button>
    </div>
    <div class="alert-container active">Password copied</div>
    <script>
      const btnEl = document.querySelector(".btn");
      const inputEl = document.getElementById("input");
      const copyIconEl = document.querySelector(".fa-solid");
      const alertEl = document.querySelector(".alert-container")


      btnEl.addEventListener("click", () => {
        createPassword()
      });
      copyIconEl.addEventListener("click", () => {
        copyPassword()
        if(inputEl.value){
           alertEl.classList.remove("active");
        setTimeout(() => {
          alertEl.classList.add("active");
        }, 2000);
        }
        
      });

      function createPassword() {
        const chars = "0123456789abcdefghijklmnopqrstuvwxyz!@#$%^&*()_+?:{}[]ABCDEFGHIJKLMNOPQRSTUVWXYZ"
        const PasswordLength = 14;
        let Password = "";
        for (let index = 0; index < PasswordLength; index++) {
          const randomNum = Math.floor(Math.random() * chars.length);
          Password += chars.substring(randomNum, randomNum + 1);
          console.log(randomNum, Password)
        }
         inputEl.value = Password;
         alertEl.innerText = Password + "copied!"
      }
      // ---
      function copyPassword(){
        inputEl.select();
        inputEl.setSelectionRange(0,9999);
        navigator.clipboard.writeText(inputEl.value);
        
      }
    </script>

</body>
</html>
