<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eater counter down</title>

    <style>
        body{
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            background: rgb(18, 142, 159);
        }
        h2{
            color: white;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div>
    <h2>Easter countdown</h2>
    <div class="counterdown">
        <div id="day id">00</div>
        <div id="hour">00</div>
        <div id="minute">00</div>
        <div id="second">00</div>

    </div>
</div>
</body>
</html>
