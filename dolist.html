<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
            font-family: "Popins", sans-serif;
        }
        .container{
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(150deg, #707, #0076);
           padding: 10px;
        }

        .do-text{
            width: 40%;
            max-height: 540px;
           margin: 100px auto 20px;
           padding:  40px 30px 70px;
           gap: 0.5rem;
           background: #fff;
           border-radius: 10px;
        }
        .do-text h2{
        color: #002765;
        display: flex;
        align-items: center;
        margin-bottom: 20px;
        }
        
        .do-text h2 img{
            margin-left: 0.5rem;
        }
        .form{
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #edeef0;
            border-radius: 30px;
            padding-left: 20px;
            margin-bottom: 25px;
        }
        input{
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-weight: 14px;
        }
        button{
            border: none;
            outline: none;
            padding: 16px 50px;
            background: #ff5945;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border-radius: 40px;
        }
        ul li {
            list-style: none;
            font-size: 17px;
            padding: 12px 8px 12px 50px;
            user-select: none;
            cursor: pointer;
            position: relative;
        }

         ul li::before {
        content: "";
        position: absolute;
        height: 28px;
        width: 28px;
        border-radius: 50%;
        background-image: url(empty\ circ.avif);
        background-size: cover;
        background-position: center;
        top: 12px;
        left: 8px;
         }
          ul li.checked{
            color: #555;
            text-decoration: line-through;
          }
          ul li.checked::before{
        background-image: url(unchecked\ circ.avif);
          }
    </style>
</head>
<body>
    <div class="container">
    <div class="do-text">
<h2>To-Do List App
    <img src="book-removebg-preview.png" alt="book" width="10%">
</h2>
    <div class="form">
        <input type="text" id="input-text" placeholder="Enter your text">
        <button onclick="addTask()">Add</button>
    </div>

 <ul id="list-items">
<!-- <li class="checked">maggi</li>
<li>onions</li>
<li>akara</li>
<li>biscuit</li>  -->
        </ul> 
    </div>

    </div>

    <script>
        const inputBox = document.getElementById("input-text");
        const listContainer = document.getElementById("list-items");
         
        function addTask(){
            if(inputBox.value ===""){
                alert("you must write something");
            }
            else {
            let li = document.createElement("li");
            li.innerHTML = inputBox.value;
        
            let span = document.createElement("span")
            span.innerHTML = "\u00d7"
            span.style.marginLeft = "20rem";
            span.style.color = "white";
            span.style.cursor = "pointer"
            span.style.background = "red"
            span.style.borderRadius = "50%"
            span.style.fontSize = "22px"
             span.style.width = "40px"
             
            li.appendChild(span);
            span.onclick = function () {
                li.remove();
            };
            li.appendChild(span);
            listContainer.appendChild(li);
        }
        
        inputBox.value = "";
        saveData();
        }

       listContainer.addEventListener("click", function(e) {
        if(e.target.tagName === "LI"){
            e.target.classList.toggle("checked")
            saveData();
        }
        else if(e.target.tagName === "SPAN"){
            e.target.parentElement.remove();
            saveData();
        }
        }, false);
// store in browser to save in the browser
        function saveData(){
            localStorage.setItem("data", listContainer.innerHTML)
        }

        function showTask(){
            listContainer.innerHTML = localStorage.getItem("data");
        }
        showTask();
    </script>
</body>
</html>
