<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do app.com2</title>



    <style>

        body{
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(to bottom left, rgb(175, 50, 91), rgb(20, 12, 17));
        }
        .container{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .content {
            background: #fff;
            min-height: 400px;
            width: 540px;
            padding: 20px;
            border-radius: 10px;
        }
        h1{
            text-align: center;
        }

        input{
            font-size: medium;
            margin-top: 40px;
            margin-bottom: 10px;
            width: 80%;
            padding: 10px;
            border: none;
            border-bottom: 1px solid rgb(239, 223, 223);
            outline: "none";
        }

         button{
            padding: 10px 20px;
            background: rgb(21, 74, 208);
            border: none;
            border-radius: 5px;
            color: #fff;
            font-weight: 100;
            cursor: pointer;
         }
         ul{
            list-style: none;
            padding: none;
           
         }
         li{
            margin: 10px 0;
            padding: 10px;
            border: 2px solid rgb(243, 236, 236);
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center; 
            margin-right: 2rem;
         }
         .delete-btn{
            background: red;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 5px 10px;
            cursor: pointer;
         }
    </style>
</head>
<body>
    <div class="container">
<div class="content">
<h1>My To-do List App</h1>
<input type="text" id="inputBox" placeholder="Enter text">
<button id="add-btn">Add Task</button>
<ul id="task-list"></ul>
</div>
    </div>

    <script>
        const inputBtn = document.getElementById("inputBox");
        const addBtn = document.getElementById("add-btn");
        const taskList = document.getElementById("task-list");

          addBtn.addEventListener("click", () => {
            if(inputBtn.value !== ""){
                const taskText = inputBtn.value;
                const listItem = document.createElement("li");
                listItem.innerHTML = `
                ${taskText} <button class ="delete-btn">Delete</button>`;

                taskList.appendChild(listItem);
              inputBtn.value = "";
            }
          });

          taskList.addEventListener("click", (event) => {
            if(event.target.classList.contains("delete-btn")){
                const listItem = event.target.parentElement;
                taskList.removeChild(listItem)
            }
          })

    </script>
</body>
</html>
